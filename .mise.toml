[tools]
rust                     = { version = "stable", profile = "default", components = "rust-analyzer", targets = "wasm32-unknown-unknown" }
tombi                    = "latest"
zizmor                   = "latest"
"cargo:cargo-binstall"   = "latest"
"cargo:cargo-audit"      = "latest"
"cargo:trunk"            = "latest"
"cargo:wasm-bindgen-cli" = "latest"

[settings]
experimental   = true
lockfile       = true
cargo.binstall = true

[tasks.dev]
description = "Start development server with hot-reload"
run         = "trunk serve"
alias       = "d"

[tasks.build]
description = "Build for production"
usage       = 'arg "<public_url>" var=#true help="Public URL for the built assets (e.g., my-app)"'
run         = "trunk build --public-url /${usage_public_url}"
alias       = "b"
sources     = [
  "Cargo.lock",
  "Cargo.toml",
  "src/**/*.rs",
  "styles/**/*.scss",
  "index.html",
  "index.scss",
]
outputs     = ["dist/"]

[tasks.test]
description = "Run tests"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo test"'
run         = "cargo test --all-features ${usage_args:-}"
alias       = "t"
sources     = ["Cargo.lock", "Cargo.toml", "src/**/*.rs"]

[tasks.lint]
description = "Lint code with clippy"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo clippy"'
run         = "cargo clippy --all-targets --all-features ${usage_args:-} -- -D warnings"

[tasks."lint:fix"]
description = "Fix lint issues"
usage       = 'arg "[args]" var=#true help="Additional arguments passed to cargo clippy"'
run         = "cargo clippy --fix --all-targets --all-features --allow-staged ${usage_args:-} -- -D warnings"

[tasks.format]
description = "Format code"
run         = ["cargo fmt", "tombi format"]
alias       = "f"
sources     = ["src/**/*.rs", "Cargo.toml"]

[tasks."format:check"]
description = "Check code formatting"
run         = ["cargo fmt --check", "tombi format --check"]
sources     = ["src/**/*.rs", "Cargo.toml"]

[tasks.audit]
description = "Audit dependencies for known vulnerabilities"
run         = "cargo audit"

[tasks.check]
description = "Run all checks (format, lint, test, audit)"
depends     = ["format:check", "lint", "test", "audit"]

[tasks."check:actions"]
description = "Lint GitHub Actions workflows"
run         = "zizmor .github/"

[tasks.clean]
description = "Clean build artifacts"
run         = "rm -rf target dist"
